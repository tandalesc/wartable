<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wartable</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-left">
            <h1>wartable</h1>
            <div id="connection-dot"></div>
        </div>
        <div id="system-metrics">
            <div class="metric" id="metric-cpu">
                <div class="metric-top">
                    <span class="metric-label">CPU</span>
                    <span class="metric-val" id="val-cpu">--</span>
                </div>
                <div class="metric-bar"><div class="metric-fill fill-cpu" id="bar-cpu"></div></div>
            </div>
            <div class="metric" id="metric-ram">
                <div class="metric-top">
                    <span class="metric-label">MEM</span>
                    <span class="metric-val" id="val-ram">--</span>
                </div>
                <div class="metric-bar"><div class="metric-fill fill-ram" id="bar-ram"></div></div>
            </div>
            <div class="metric" id="metric-disk">
                <div class="metric-top">
                    <span class="metric-label">DISK</span>
                    <span class="metric-val" id="val-disk">--</span>
                </div>
                <div class="metric-bar"><div class="metric-fill fill-disk" id="bar-disk"></div></div>
            </div>
            <div class="metric metric-text">
                <span class="metric-label">LOAD</span>
                <span class="metric-val" id="val-load">--</span>
            </div>
        </div>
    </header>

    <div id="gpu-strip"></div>

    <main>
        <div id="jobs-panel">
            <div class="toolbar">
                <div class="toolbar-left">
                    <span class="toolbar-title">QUEUE</span>
                    <span class="toolbar-count" id="job-count">0</span>
                </div>
                <div class="toolbar-right">
                    <div class="filter-pills">
                        <button class="pill active" data-status="all">All</button>
                        <button class="pill" data-status="running">Running</button>
                        <button class="pill" data-status="queued">Queued</button>
                        <button class="pill" data-status="completed">Done</button>
                        <button class="pill" data-status="failed">Failed</button>
                        <button class="pill" data-status="cancelled">Cancelled</button>
                    </div>
                </div>
            </div>
            <div class="table-wrap">
                <table id="jobs-table">
                    <thead>
                        <tr>
                            <th data-sort="status" class="sortable">STATUS</th>
                            <th data-sort="name" class="sortable sorted-asc">NAME</th>
                            <th data-sort="command">CMD</th>
                            <th data-sort="submitted_at" class="sortable">SUBMITTED</th>
                            <th data-sort="duration" class="sortable">DURATION</th>
                            <th data-sort="exit_code" class="sortable">EXIT</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="jobs-body"></tbody>
                </table>
                <div id="empty-state" class="hidden">
                    <span>No jobs</span>
                </div>
            </div>
        </div>

        <div id="detail-panel" class="hidden">
            <div class="detail-header">
                <div class="detail-title">
                    <span id="detail-name">-</span>
                    <span id="detail-status-badge" class="status-badge">-</span>
                </div>
                <button id="close-detail" aria-label="Close">&times;</button>
            </div>
            <div id="detail-meta"></div>
            <div id="log-controls">
                <div class="log-tabs">
                    <button class="log-tab active" data-stream="both">Combined</button>
                    <button class="log-tab" data-stream="stdout">stdout</button>
                    <button class="log-tab" data-stream="stderr">stderr</button>
                </div>
                <label class="follow-toggle">
                    <input type="checkbox" id="log-follow" checked>
                    <span>Follow</span>
                </label>
            </div>
            <pre id="log-output"></pre>
        </div>
    </main>
    <div id="auth-overlay">
        <div class="auth-modal">
            <h2>Authentication</h2>
            <p>This wartable instance requires an API key.</p>
            <input type="password" id="auth-key-input" placeholder="API key">
            <span id="auth-error">Invalid API key. Please try again.</span>
            <button id="auth-submit">Connect</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
